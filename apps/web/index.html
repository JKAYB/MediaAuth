<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var k = "mediaauth-theme";
          var v = localStorage.getItem(k);
          var root = document.documentElement;
    
          var systemDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
    
          var resolved =
            v === "light"
              ? "light"
              : v === "dark"
                ? "dark"
                : systemDark
                  ? "dark"
                  : "light";
    
          root.classList.toggle("dark", resolved === "dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaAuth</title>
    <link rel="icon" type="image/png" href="/brand/mark.png" sizes="any" />
    <link rel="apple-touch-icon" href="/brand/mark.png" />
    <meta property="og:image" content="/brand/Light-Logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/brand/Light-Logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-render-blocking fonts: preload then promote to stylesheet after load (Lighthouse). -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
